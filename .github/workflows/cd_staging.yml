name: CD — Staging

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Build version override (e.g. 1.0.0). Leave empty to auto-generate from timestamp.'
        required: false
        default: ''

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:e2e

  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci

      - name: Set build version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(date -u +%Y.%m.%d-%H%M)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          BUILD_VERSION: ${{ steps.version.outputs.value }}

      - name: Write build metadata
        run: |
          cat > dist/build.json << EOF
          {
            "version": "${{ steps.version.outputs.value }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "runId": "${{ github.run_id }}"
          }
          EOF

      - name: Archive build
        run: tar -czf dist-${{ steps.version.outputs.value }}.tar.gz dist/

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 3

      - uses: actions/upload-artifact@v6
        with:
          name: dist-archive
          path: dist-${{ steps.version.outputs.value }}.tar.gz
          retention-days: 3

  deploy:
    needs: [test, e2e, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC authentication with AWS
      contents: read
    environment: staging
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v6
        with:
          name: dist-archive

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Store build archive in S3
        run: |
          aws s3 cp dist-${{ needs.build.outputs.version }}.tar.gz \
            s3://${{ secrets.AWS_S3_ARTIFACTS_BUCKET }}/builds/${{ needs.build.outputs.version }}/dist.tar.gz

      - name: Upload build to staging S3
        run: aws s3 sync dist/ s3://${{ secrets.AWS_S3_STAGING_BUCKET }} --delete

      - name: Fetch BasicAuth credentials from Secrets Manager
        id: secret
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${{ secrets.AWS_SECRET_ID }}" \
            --query SecretString --output text)
          USERNAME=$(echo "$SECRET" | jq -r '.username')
          PASSWORD=$(echo "$SECRET" | jq -r '.password')
          # Mask both values so they never appear in logs
          echo "::add-mask::$USERNAME"
          echo "::add-mask::$PASSWORD"
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Generate and publish CloudFront Function
        env:
          CF_USERNAME: ${{ steps.secret.outputs.username }}
          CF_PASSWORD: ${{ steps.secret.outputs.password }}
          CF_FUNCTION_NAME: ${{ secrets.AWS_CF_FUNCTION }}
        run: |
          ENCODED=$(printf '%s:%s' "$CF_USERNAME" "$CF_PASSWORD" | base64 -w 0)

          cat > function.js << 'EOF'
          function handler(event) {
            var request = event.request;
            var headers = request.headers;
            if (
              !headers.authorization ||
              headers.authorization.value !== 'Basic __ENCODED__'
            ) {
              return {
                statusCode: 401,
                statusDescription: 'Unauthorized',
                headers: { 'www-authenticate': { value: 'Basic realm="Staging"' } },
              };
            }
            return request;
          }
          EOF

          sed -i "s/__ENCODED__/$ENCODED/" function.js

          ETAG=$(aws cloudfront describe-function \
            --name "$CF_FUNCTION_NAME" \
            --query ETag --output text)

          aws cloudfront update-function \
            --name "$CF_FUNCTION_NAME" \
            --function-code fileb://function.js \
            --function-config Comment="BasicAuth for staging",Runtime="cloudfront-js-2.0" \
            --if-match "$ETAG"

          UPDATED_ETAG=$(aws cloudfront describe-function \
            --name "$CF_FUNCTION_NAME" \
            --query ETag --output text)

          aws cloudfront publish-function \
            --name "$CF_FUNCTION_NAME" \
            --if-match "$UPDATED_ETAG"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.AWS_CF_DISTRIBUTION_ID }}" \
            --paths "/*"
