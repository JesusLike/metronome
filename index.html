<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metronome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 48px 56px;
      background: #1e1e1e;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      min-width: 320px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
    }

    .tempo-display {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    #tempo-input {
      width: 100px;
      font-size: 4rem;
      font-weight: 700;
      text-align: center;
      background: transparent;
      border: none;
      color: #f0f0f0;
      outline: none;
      -moz-appearance: textfield;
    }

    #tempo-input::-webkit-inner-spin-button,
    #tempo-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    #tempo-input:focus {
      color: #fff;
      text-shadow: 0 0 20px rgba(255,255,255,0.3);
    }

    .bpm-label {
      font-size: 1rem;
      color: #666;
      font-weight: 500;
    }

    #tempo-slider {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #333;
      outline: none;
      cursor: pointer;
    }

    #tempo-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      transition: transform 0.1s;
    }

    #tempo-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

    #tempo-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: none;
    }

    #toggle-btn {
      width: 100%;
      padding: 16px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #fff;
      color: #111;
      transition: background 0.15s, color 0.15s, transform 0.1s;
    }

    #toggle-btn:hover { background: #e0e0e0; }
    #toggle-btn:active { transform: scale(0.97); }

    #toggle-btn.running {
      background: #333;
      color: #fff;
      border: 1px solid #444;
    }

    #toggle-btn.running:hover { background: #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Metronome</h1>

    <div class="tempo-display">
      <input id="tempo-input" type="number" min="20" max="300" value="120">
      <span class="bpm-label">BPM</span>
    </div>

    <input id="tempo-slider" type="range" min="20" max="300" value="120">

    <button id="toggle-btn">Start</button>
  </div>

  <script>
    const MIN_BPM = 20;
    const MAX_BPM = 300;
    const LOOKAHEAD_MS = 25;
    const SCHEDULE_AHEAD_S = 0.1;

    let audioCtx = null;
    let running = false;
    let nextNoteTime = 0;
    let timerId = null;
    let tempo = 120;

    const tempoInput = document.getElementById('tempo-input');
    const tempoSlider = document.getElementById('tempo-slider');
    const toggleBtn = document.getElementById('toggle-btn');

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    function setTempo(val) {
      tempo = clamp(Math.round(val), MIN_BPM, MAX_BPM);
      tempoInput.value = tempo;
      tempoSlider.value = tempo;
    }

    tempoInput.addEventListener('input', () => {
      const val = parseInt(tempoInput.value, 10);
      if (!isNaN(val)) setTempo(val);
    });

    tempoInput.addEventListener('blur', () => {
      // Enforce bounds when user leaves the field
      setTempo(parseInt(tempoInput.value, 10) || tempo);
    });

    tempoSlider.addEventListener('input', () => {
      setTempo(parseInt(tempoSlider.value, 10));
    });

    function scheduleClick(time) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.frequency.value = 1000;
      osc.type = 'sine';

      gain.gain.setValueAtTime(0, time);
      gain.gain.linearRampToValueAtTime(0.8, time + 0.002);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.06);

      osc.start(time);
      osc.stop(time + 0.06);
    }

    function scheduler() {
      while (nextNoteTime < audioCtx.currentTime + SCHEDULE_AHEAD_S) {
        scheduleClick(nextNoteTime);
        nextNoteTime += 60.0 / tempo;
      }
      timerId = setTimeout(scheduler, LOOKAHEAD_MS);
    }

    function start() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      nextNoteTime = audioCtx.currentTime + 0.05;
      running = true;
      scheduler();
      toggleBtn.textContent = 'Stop';
      toggleBtn.classList.add('running');
    }

    function stop() {
      clearTimeout(timerId);
      running = false;
      toggleBtn.textContent = 'Start';
      toggleBtn.classList.remove('running');
    }

    toggleBtn.addEventListener('click', () => {
      running ? stop() : start();
    });
  </script>
</body>
</html>
